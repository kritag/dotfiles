- sudo:
    - defaults:
        yum:
          options: "-q -y"
          stdout: False
          stderr: True
    - shell:
        # - ['curl -L https://github.com/maximilionus/lucidglyph/archive/refs/tags/v0.13.1.tar.gz | tar xz && cd lucidglyph-0.13.1 && ./lucidglyph.sh install']
        - ["grubby --info=ALL | grep -q 'selinux=0' || grubby --update-kernel ALL --args selinux=0", "Set kernel arg selinux=0"]
        - ["[ -f /etc/selinux/config ] && sed -i 's/^SELINUX=.*/SELINUX=disabled/' /etc/selinux/config", "Set SELINUX=disabled in /etc/selinux/config"]
        - ['command -v || sudo dnf install https://prerelease.keybase.io/keybase_amd64.rpm']
        - [dnf copr enable ctrldemi/ly-dm -y]
        - [dnf copr enable johan/fedora-rpms -y]
        - [dnf copr enable alternateved/eza -y]
        - [dnf copr enable skoved/vivid -y]
        - [dnf copr enable mmu/mmu-dist-rpms -y]
        - [dnf copr enable gierth/tools-golang -y]
        - [dnf copr enable buckaroogeek/k8s-utils -y]
        - [dnf copr enable awood/bat-extras -y]
        - [dnf copr enable tx0su/bibata-cursor-theme-noarch -y]
        - [dnf copr enable execowl/themes -y]
        - [dnf copr enable cgrau/personal -y]
        - [dnf copr enable brycensranch/gpu-screen-recorder-git -y]
        - [dnf copr enable enmanuelmoreira/mapanare-labs -y]
        - [dnf copr enable shdwchn10/AllTheTools -y]
        - ['wget -O- https://rpm.releases.hashicorp.com/fedora/hashicorp.repo | sudo tee /etc/yum.repos.d/hashicorp.repo']
        - ['sudo sed -i ''/^excludepkgs=/d'' /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:shdwchn10:AllTheTools.repo && sudo sh -c ''echo "excludepkgs=fzf" >> /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:shdwchn10:AllTheTools.repo''']
        - [dnf copr enable holeprof/fedora-extended -y]
        - ['sudo grep -qxF ''includepkgs=obsidian oh-my-posh'' /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:holeprof:fedora-extended.repo || sudo sh -c ''echo "includepkgs=obsidian oh-my-posh" >> /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:holeprof:fedora-extended.repo''']
        - [dnf copr enable rocketraman/slack-repo -y]
        - [dnf copr enable ahaupt/lesspipe -y]
        - ['curl -L https://github.com/Misterio77/flavours/releases/download/v0.7.1/flavours-v0.7.1-x86_64-linux.tar.gz \ | sudo tar -xz -C /usr/local/bin flavours']
        - [plymouth-set-default-theme spinner -R]
        - [systemctl mask keybase-redirector.service, "Mask keybase-redirector.service"]
        - [rm -f /etc/xdg/autostart/solaar.desktop]
        - [sudo dnf --releasever=43 install terraform]
    - yum: [alsa-ucm, alsa-lib, alsa-utils, alsa-firmware, alsa-sof-firmware, argocd, bat, bat-extras, bibata-cursor-themes, btop, btrfsmaintenance, dms, dnf-automatic, dnf-plugins-core, dracula-gtk-theme, duf, fastfetch, fd-find, file-roller, flux-dist, fprintd, fprintd-pam, fuse-sshfs, fwupd, fzf, gcr, gh, git, git-delta, github-copilot, glow, gnome-calculator, gnome-keyring, gnome-keyring-pam, gnome-text-editor, google-noto-emoji-fonts, google-noto-color-emoji-fonts, grimblast, gpu-screen-recorder-gtk, gvfs-smb, helm, hyprland, hyprlock, ImageMagick, inotify-tools, intel-media-driver, iwlwifi-mld-firmware, jq, k9s, keepassxc, kind, kitty, krew, kubeconform-dist, kubecolor, kubectl, kubectx, kubeseal, lazygit, less, lesspipe, libreoffice, libva-intel-driver, libva-utils, loupe, lpf-spotify-client, ly, make, man-db, mangohud, mokutil, mpv, neovim, netcat, NetworkManager, NetworkManager-wifi, obs-studio, obsidian, oc, oh-my-posh, papers, papirus-icon-theme, papirus-icon-theme-dark, pipx, playerctl, plymouth, plymouth-system-theme, power-profiles-daemon, procs, python3, python3-pip, qbittorrent, qt6-qtmultimedia, quickshell, ripgrep, seahorse, slack-repo, snapper, socat, solaar, sops, sqlite, sshpass, sshuttle, stern, systemd-resolved, tar, tealdeer, thunar, thunar-archive-plugin, thunar-volman, tree, tree-sitter-cli, unzip, uwsm, vim, vivid, vulkan-tools, wget, wiremix, wl-clipboard, xdg-desktop-portal-gtk, xdg-desktop-portal-hyprland, xdg-desktop-portal, xdg-user-dirs, yq, zen-browser, zoxide, zsh]
- shell:
    - [krew update && krew install view-secret]
    - [scripts/bootstrap-private-overlay, Run private post-install overlay from Keybase if present]
