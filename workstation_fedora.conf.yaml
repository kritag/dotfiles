- sudo:
    - defaults:
        yum:
          options: "-q -y"
          stdout: False
          stderr: True
    - shell:
        - ["grubby --info=ALL | grep -q 'selinux=0' || grubby --update-kernel ALL --args selinux=0", "Set kernel arg selinux=0"]
        - ["[ -f /etc/selinux/config ] && sed -i 's/^SELINUX=.*/SELINUX=disabled/' /etc/selinux/config", "Set SELINUX=disabled in /etc/selinux/config"]
        - [dnf copr enable brycensranch/gpu-screen-recorder-git -y]
        - [dnf copr enable bonvaffel/cli-tools -y]
        - [plymouth-set-default-theme spinner -R]
        - [systemctl mask keybase-redirector.service, "Mask keybase-redirector.service"]
        - [rm -f /etc/xdg/autostart/solaar.desktop]
    - yum: [alsa-ucm, alsa-lib, alsa-utils, alsa-firmware, alsa-sof-firmware, argocd, bat, bat-extras, bibata-cursor-theme, btop, btrfsmaintenance, dms, dnf-automatic, dnf-plugins-core, dracula-gtk-theme, duf, fastfetch, fd-find, file-roller, flavours, flux, fprintd, fprintd-pam, fuse-sshfs, fwupd, fzf, gcr, gh, git, git-delta, github-copilot, glow, gnome-calculator, gnome-keyring, gnome-keyring-pam, gnome-text-editor, google-noto-emoji-fonts, google-noto-color-emoji-fonts, grimblast, gpu-screen-recorder-gtk, gvfs-smb, helm, hyprland, hyprlock, ImageMagick, inotify-tools, intel-media-driver, iwlwifi-mld-firmware, jq, k9s, keepassxc, kind, kitty, krew, kubeconform-dist, kubecolor, kubectl, kubectx, kubeseal, lazygit, less, lesspipe, libreoffice, libva-intel-driver, libva-utils, loupe, lpf-spotify-client, ly, make, man-db, mangohud, mokutil, mpv, neovim, netcat, NetworkManager, NetworkManager-wifi, obs-studio, obsidian, oc, oh-my-posh, papers, papirus-icon-theme, papirus-icon-theme-dark, pipx, playerctl, plymouth, plymouth-system-theme, power-profiles-daemon, procs, python3, python3-pip, qbittorrent, qt6-qtimageformats, qt6-qtmultimedia, quickshell, ripgrep, seahorse, slack-repo, snapper, socat, solaar, sops, sqlite, sshpass, sshuttle, stern, systemd-resolved, tar, tealdeer, terraform, thunar, thunar-archive-plugin, thunar-volman, tree, tree-sitter-cli, unzip, uwsm, vim, vivid, vulkan-tools, wget, wiremix, wl-clipboard, xdg-desktop-portal-gtk, xdg-desktop-portal-hyprland, xdg-desktop-portal, xdg-user-dirs, yq, zen-browser, zoxide, zsh]
- shell:
    - [krew update && krew install view-secret]
    - [scripts/bootstrap-private-overlay, Run private post-install overlay from Keybase if present]
